name: transcription_app
description: Local audio transcription app using faster-whisper backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  record: ^5.1.2
  http: ^1.2.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  supabase_flutter: ^2.8.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
